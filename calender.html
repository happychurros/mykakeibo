<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月間家計簿カレンダー（2026年度）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        /* 送信フォームと同じ配色変数を定義 */
        :root {
            --primary-color: #48c9b0;    /* メイン：ミントグリーン */
            --primary-hover: #34a891;    /* ホバー：濃いミント */
            --bg-soft-pink: #e0f7fa;     /* 背景：ごく薄い水色 */
            --bg-dot: #a2e2eb;           /* ドット：少し濃い水色 */
            --text-main: #2c3e50;        /* テキスト：ネイビーグレー */
            --text-label: #546e7a;       /* ラベル：ブルーグレー */
            --border-color: #b0e0e6;     /* ボーダー：パウダーブルー */
        }

        /* 全体レイアウト（送信フォームと統一） */
        body {
            position: relative;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-soft-pink);
            background-image:
              radial-gradient(var(--bg-dot) 15%, transparent 16%),
              radial-gradient(var(--bg-dot) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 動く背景グラデーション */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #d1f1ff, #d4f8f0, #e1fffd);
            background-size: 400% 400%;
            opacity: 0.6;
            z-index: -1;
            animation: gradient-animation 15s ease infinite;
        }

        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* カレンダーのコンテナ */
        .calendar-container {
            background-color: #ffffff;
            padding: 20px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.1); 
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* ヘッダー（月切り替え部分） */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin: 0;
            font-size: 1.8em;
            text-shadow: 2px 2px 4px rgba(0, 150, 136, 0.175); 
        }

        .nav-btn {
            background-color: var(--bg-soft-pink);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* カレンダーのグリッド構造 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        /* 曜日の行 */
        .weekday {
            text-align: center;
            font-weight: 700;
            color: var(--text-label);
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border-color);
            font-size: 0.9em;
        }
        .sun { color: #e74c3c; } /* 日曜日は赤 */
        .sat { color: #3498db; } /* 土曜日は青 */

        /* 日付のマス */
        .day-cell {
            background-color: #f5ffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            min-height: 70px;
            padding: 6px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .day-cell:hover {
            background-color: #e0f2f1;
            border-color: var(--primary-color);
        }

        /* 先月・来月の日付の薄表示 */
        .other-month {
            opacity: 0.3;
        }

        /* 日付の数字 */
        .day-number {
            font-weight: 700;
            font-size: 0.9em;
            color: var(--text-main);
        }

        /* 金額の表示エリア */
        .day-amount {
            font-weight: 700;
            font-size: 0.8em;
            color: #e67e22; /* オレンジ系の目立つ色 */
            text-align: right;
            word-break: break-all;
        }

        /* フォームへの戻るリンクボタン */
        .back-link-container {
            text-align: center;
            margin-top: 10px;
        }
        .back-link-container a {
            text-decoration: none;
            color: #4db6ac;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .back-link-container a:hover {
            color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i> 前月</button>
            <h1 id="calendarTitle">2026年 6月</h1>
            <button class="nav-btn" id="nextBtn">次月 <i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday sun">日</div>
            <div class="weekday">月</div>
            <div class="weekday">火</div>
            <div class="weekday">水</div>
            <div class="weekday">木</div>
            <div class="weekday">金</div>
            <div class="weekday sat">土</div>

            </div>
    </div>

    <div class="back-link-container">
        <a href="index.html"><i class="fa-solid fa-pen-to-square"></i> 家計簿送信フォームに戻る</a>
    </div>

    <script>
        // 2026年6月を初期表示のターゲットにする
        let currentYear = 2026;
        let currentMonth = 5; // JavaScriptの月は 0(1月)〜11(12月) なので 5 は6月

        const calendarTitle = document.getElementById('calendarTitle');
        const calendarGrid = document.getElementById('calendarGrid');

        function generateCalendar(year, month) {
            // 曜日ヘッダー以外の古い日付セルを削除
            const cells = calendarGrid.querySelectorAll('.day-cell');
            cells.forEach(cell => cell.remove());

            // タイトルの更新
            calendarTitle.textContent = `${year}年 ${month + 1}月`;

            // 月の初日の曜日と、月が何日まであるかを取得
            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            // 先月の最終日（カレンダーの穴埋め用）
            const prevLastDay = new Date(year, month, 0).getDate();

            // 1. 先月の日付を埋める
            for (let i = firstDayIndex; i > 0; i--) {
                const day = prevLastDay - i + 1;
                createDayCell(day, 'other-month');
            }

            // 2. 今月の日付を埋める
            for (let i = 1; i <= lastDay; i++) {
                // テスト用にランダムな金額をダミーで表示させてみる（あとで消します）
                const dummyAmount = i % 3 === 0 ? `¥${(i * 350).toLocaleString()}` : '';
                createDayCell(i, '', dummyAmount);
            }

            // 3. 来月の日付を埋めてグリッドを42マス（6週間分）に揃える
            const totalCells = firstDayIndex + lastDay;
            const nextMonthDays = 42 - totalCells;
            for (let i = 1; i <= nextMonthDays; i++) {
                createDayCell(i, 'other-month');
            }
        }

        // マス目を生成する共通関数
        function createDayCell(dayNum, className, amountText = '') {
            const cell = document.createElement('div');
            cell.className = `day-cell ${className}`;

            const numberSpan = document.createElement('span');
            numberSpan.className = 'day-number';
            numberSpan.textContent = dayNum;
            cell.appendChild(numberSpan);

            const amountSpan = document.createElement('span');
            amountSpan.className = 'day-amount';
            amountSpan.textContent = amountText;
            cell.appendChild(amountSpan);

            calendarGrid.appendChild(cell);
        }

        // 前月・次月ボタンのイベント
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            generateCalendar(currentYear, currentMonth);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            generateCalendar(currentYear, currentMonth);
        });

        // 初回実行
        generateCalendar(currentYear, currentMonth);
    </script>
</body>
</html>
