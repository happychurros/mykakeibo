<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月間家計簿カレンダー（2026年度）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');
        :root {
            --primary-color: #48c9b0;
            --primary-hover: #34a891;
            --bg-soft-pink: #e0f7fa;
            --bg-dot: #a2e2eb;
            --text-main: #2c3e50;
            --text-label: #546e7a;
            --border-color: #b0e0e6;
        }

        body {
            position: relative;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-soft-pink);
            background-image:
            radial-gradient(var(--bg-dot) 15%, transparent 16%),
            radial-gradient(var(--bg-dot) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #d1f1ff, #d4f8f0, #e1fffd);
            background-size: 400% 400%;
            opacity: 0.6;
            z-index: -1;
            animation: gradient-animation 15s ease infinite;
        }

        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* カレンダーの外枠（カード） */
        .calendar-container {
            background-color: #ffffff;
            padding: 8px 8px 12px 8px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.1); 
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin: 0;
            font-size: 1.5em;
            text-shadow: 2px 2px 4px rgba(0, 150, 136, 0.175); 
        }

        .nav-btn {
            background-color: var(--bg-soft-pink);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* すき間ゼロのグリッド構造 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0px;
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        /* 曜日ヘッダー */
        .weekday {
            text-align: center;
            font-weight: 700;
            color: var(--text-label);
            padding: 6px 0;
            font-size: 0.8em;
            background-color: #f5ffff;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .sun { color: #e74c3c; background-color: #fff5f5; }
        .sat { color: #3498db; background-color: #f0f8ff; }

        /* 日付の1マス */
        .day-cell {
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            aspect-ratio: 1.5 / 1; 
            padding: 2px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
            overflow: hidden;
        }

        .day-cell:hover {
            background-color: #e0f2f1;
        }

        .other-month {
            background-color: #fafafa;
        }
        .other-month .day-number {
            opacity: 0.25;
        }

        .day-number {
            font-weight: 700;
            font-size: 0.6em;
            color: var(--text-main);
            line-height: 1;
        }

        .day-amount {
            font-weight: 700;
            font-size: 0.55em;
            color: #e67e22;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-overlay {
            color: var(--text-label);
            text-align: center;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.8em;
            visibility: hidden;
        }

        .back-link-container {
            text-align: center;
            margin-top: 5px;
        }

        .back-link-container a .fa-solid {
            font-size: 32px;
            color: #4db6ac;
            transition: all 0.3s ease;
        }

        .back-link-container a:hover .fa-solid {
            color: var(--primary-hover);
            transform: translateY(-3px);
        }

        /* 支出詳細エリア */
        .detail-container {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.1); 
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            max-height: 200px; 
            overflow-y: auto; 
        }

        .detail-title {
            font-size: 0.9em;
            font-weight: 700;
            color: var(--text-label);
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--text-main);
            padding: 6px 0;
            border-bottom: 1px dashed #e0f2f1;
        }
        .detail-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div id="loadingStatus" class="loading-overlay"><i class="fa-solid fa-spinner fa-spin"></i> データを読み込み中...</div>
        
        <div class="calendar-header">
            <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i> 前月</button>
            <h1 id="calendarTitle">2026年 4月</h1>
            <button class="nav-btn" id="nextBtn">次月 <i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday sun">日</div>
            <div class="weekday">月</div>
            <div class="weekday">火</div>
            <div class="weekday">水</div>
            <div class="weekday">木</div>
            <div class="weekday">金</div>
            <div class="weekday sat">土</div>
        </div>
    </div>

    <div class="detail-container">
        <div class="detail-title" id="detailTitle">選択した日の内訳</div>
        <div id="detailList">
            <div class="detail-item" style="color: #95a5a6; justify-content: center;">日付をタップするとここに内訳が出ます</div>
        </div>
    </div>

    <div class="back-link-container">
        <a href="index.html" title="送信フォームに戻る">
            <i class="fa-solid fa-pen-to-square"></i>
        </a>
    </div>

    <script>
        // 1. 初期設定（ページを開いた「今月」からスタートするように自動取得）
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth(); 

        // 2. 画面のパーツを捕まえる
        const calendarTitle = document.getElementById('calendarTitle');
        const calendarGrid = document.getElementById('calendarGrid');
        const loadingStatus = document.getElementById('loadingStatus');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const detailTitle = document.getElementById('detailTitle');
        const detailList = document.getElementById('detailList');

        // スプレッドシートから届いたデータを一時保存する場所
        let rawDailyData = {};

        // 3. メイン処理：カレンダーのマス目を組み立てる関数
        function updateCalendar(year, month) {
            prevBtn.disabled = (year === 2026 && month === 3);
            nextBtn.disabled = (year === 2027 && month === 2);

            const cells = calendarGrid.querySelectorAll('.day-cell');
            cells.forEach(cell => cell.remove());

            calendarTitle.textContent = year + "年 " + (month + 1) + "月";

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const prevLastDay = new Date(year, month, 0).getDate();

            // ① 先月の残りで埋める余白マス
            for (let i = firstDayIndex; i > 0; i--) {
                createDayCell(prevLastDay - i + 1, 'other-month', '');
            }

            // ② 今月の日にちマス
            for (let i = 1; i <= lastDay; i++) {
                const mStr = String(month + 1).padStart(2, '0');
                const dStr = String(i).padStart(2, '0');
                const dateStr = year + "-" + mStr + "-" + dStr;
                createDayCell(i, '', dateStr);
            }

            // ③ 来月の頭で埋める余白マス
            const totalCells = firstDayIndex + lastDay;
            const nextMonthDays = 42 - totalCells;
            for (let i = 1; i <= nextMonthDays; i++) {
                createDayCell(i, 'other-month', '');
            }

            // 詳細エリアのリセット
            detailTitle.textContent = "選択した日の内訳";
            detailList.innerHTML = '<div class="detail-item" style="color: #95a5a6; justify-content: center;">日付をタップするとここに内訳が出ます</div>';
            
            fetchDataFromServer(month + 1);
        }

        // 4. マスを1個ずつ生成する関数
        function createDayCell(dayNum, className, dateId) {
            const cell = document.createElement('div');
            cell.className = "day-cell " + className;

            const numberSpan = document.createElement('span');
            numberSpan.className = 'day-number';
            numberSpan.textContent = dayNum;
            cell.appendChild(numberSpan);

            const amountSpan = document.createElement('span');
            amountSpan.className = 'day-amount';
            if (dateId) {
                amountSpan.id = "amt-" + dateId; 
                cell.style.cursor = 'pointer';
                cell.addEventListener('click', function() {
                    showDayDetails(dateId);
                });
            }
            cell.appendChild(amountSpan);

            calendarGrid.appendChild(cell);
        }

        // 5. タップされた日付の詳細を表示する関数
        function showDayDetails(dateKey) {
            const [y, m, d] = dateKey.split('-');
            detailTitle.textContent = `${parseInt(m)}月${parseInt(d)}日の内訳`;
            detailList.innerHTML = '';

            const dayData = rawDailyData[dateKey];

            if (!dayData || !dayData.items || dayData.items.length === 0) {
                detailList.innerHTML = '<div class="detail-item" style="color: #95a5a6; justify-content: center;">この日の記録はありません</div>';
                return;
            }

            dayData.items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'detail-item';
                const detailsStr = item.details ? ` (${item.details})` : '';
                row.innerHTML = `
                    <span><strong>${item.category}</strong>${detailsStr}</span>
                    <span style="color: #e67e22; font-weight: bold;">¥${item.amount.toLocaleString()}</span>
                `;
                detailList.appendChild(row);
            });
        }

        // 6. GASからデータを取得する通信プログラム
        function fetchDataFromServer(monthNum) {
            loadingStatus.style.visibility = 'visible';
            
            const GAS_URL = "https://script.google.com/macros/s/AKfycbyBqG8l2ImchaZIHWKxcwCumWrWa046h_lf9zWqdZ0oLOFjtqQo96x5fxBEMNS--UZB/exec"; 
            
            // 💡【解決】月を「半角数字の文字列」にしてスプレッドシートの名前と完全に一致させます
            const sheetName = String(monthNum) + "月";

            // 💡【解決】URLの後ろに「&action=getTotals」という合言葉をカチッと合流させます！
            fetch(`${GAS_URL}?sheet=${encodeURIComponent(sheetName)}&action=getTotals`)
                .then(res => res.json())
                .then(dailyTotals => {
                    if (!dailyTotals || dailyTotals.status === 'error') {
                        loadingStatus.style.visibility = 'hidden';
                        return;
                    }

                    // 💡【解決】届いた生データ（新形式）を保管庫に保存
                    rawDailyData = dailyTotals;

                    // カレンダーのマスに合計金額を流し込む
                    Object.keys(rawDailyData).forEach(function(dateKey) {
                        const targetSpan = document.getElementById("amt-" + dateKey);
                        
                        // 💡【解決】データの塊の中から、合計金額（.total）だけを正しく取り出して表示
                        if (targetSpan && rawDailyData[dateKey] && rawDailyData[dateKey].total !== undefined) {
                            const amount = rawDailyData[dateKey].total;
                            if (amount > 0) {
                                targetSpan.textContent = "¥" + amount.toLocaleString();
                            }
                        }
                    });
                    
                    loadingStatus.style.visibility = 'hidden';
                })
                .catch(err => {
                    console.error("データ取得エラー:", err);
                    loadingStatus.style.visibility = 'hidden';
                });
        }

        // 7. 前月ボタン
        prevBtn.addEventListener('click', function() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            updateCalendar(currentYear, currentMonth);
        });

        // 8. 次月ボタン
        nextBtn.addEventListener('click', function() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            updateCalendar(currentYear, currentMonth);
        });

        // 9. 起動時にカレンダーを表示
        updateCalendar(currentYear, currentMonth);
    </script>
</body>
</html>
